<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#fff8f0,#f2e4d8);
text-align:center;
}

h2{
margin-top:10px;
}

#controls{
margin:10px;
}

button{
margin:4px;
padding:10px 14px;
font-size:16px;
border:none;
border-radius:8px;
background:#b45f4b;
color:white;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

button:active{
transform:scale(0.95);
}

#board{
width:92vw;
max-width:420px;
margin:auto;
display:grid;
gap:3px;
}

.piece{
width:100%;
aspect-ratio:1;
border-radius:6px;
box-shadow:0 3px 6px rgba(0,0,0,0.3);
background-size:100% 100%;
transition:transform 0.15s;
}

.piece:active{
transform:scale(0.95);
}

#timer{
font-size:18px;
margin:5px;
}

#complete{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.85);
color:white;
font-size:38px;
flex-direction:column;
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}

</style>
</head>

<body>

<h2>和菓子ジグソーパズル</h2>

<div id="controls">

<button onclick="changeImage(-1)">◀画像</button>
<button onclick="changeImage(1)">画像▶</button>

<br>

<button onclick="setLevel(3)">かんたん</button>
<button onclick="setLevel(4)">ふつう</button>
<button onclick="setLevel(5)">むずかしい</button>

<br>

<button onclick="shuffle()">シャッフル</button>

</div>

<div id="timer">TIME 0</div>

<div id="board"></div>

<div id="complete">
<div id="clearText">🎉完成！🎉</div>
<button onclick="restart()">もう一度</button>
</div>

<script>

let images=[
"puzzle1.jpg",
"puzzle2.jpg",
"puzzle3.jpg"
];

let currentImage=0;
let size=3;

let board=document.getElementById("board");

let pieces=[];
let selected=null;

let timer=0;
let timerInterval=null;

function startTimer(){

clearInterval(timerInterval);

timer=0;

timerInterval=setInterval(()=>{

timer++;

document.getElementById("timer").innerText="TIME "+timer;

},1000);

}

function setLevel(n){

size=n;

board.innerHTML="";
pieces=[];

board.style.gridTemplateColumns=`repeat(${size},1fr)`;

for(let y=0;y<size;y++){
for(let x=0;x<size;x++){

let p=document.createElement("div");

p.className="piece";

p.dataset.x=x;
p.dataset.y=y;

p.style.backgroundImage=`url(${images[currentImage]})`;

p.style.backgroundSize=`${size*100}% ${size*100}%`;

p.style.backgroundPosition=
`${(x/(size-1))*100}% ${(y/(size-1))*100}%`;

p.addEventListener("click",tapPiece);

board.appendChild(p);

pieces.push(p);

}
}

startTimer();

}

function tapPiece(){

if(selected==null){

selected=this;
this.style.outline="3px solid yellow";

}else{

let temp=this.style.backgroundPosition;

this.style.backgroundPosition=
selected.style.backgroundPosition;

selected.style.backgroundPosition=temp;

selected.style.outline="none";
selected=null;

checkComplete();

}

}

function shuffle(){

let positions=[];

pieces.forEach(p=>{
positions.push(p.style.backgroundPosition);
});

positions.sort(()=>Math.random()-0.5);

pieces.forEach((p,i)=>{
p.style.backgroundPosition=positions[i];
});

startTimer();

}

function checkComplete(){

let correct=true;

pieces.forEach((p,i)=>{

let x=i%size;
let y=Math.floor(i/size);

let pos=p.style.backgroundPosition.split(" ");

let px=parseFloat(pos[0]);
let py=parseFloat(pos[1]);

let cx=(x/(size-1))*100;
let cy=(y/(size-1))*100;

if(Math.abs(px-cx)>1 || Math.abs(py-cy)>1){
correct=false;
}

});

if(correct){

clearInterval(timerInterval);
showEffect();

}

}

function showEffect(){

document.getElementById("complete").style.display="flex";

document.getElementById("clearText").innerText=
"🎉完成！ TIME "+timer+" 秒";

for(let i=0;i<120;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"%";

c.style.background=
`hsl(${Math.random()*360},100%,50%)`;

c.style.animationDuration=
2+Math.random()*2+"s";

document.body.appendChild(c);

}

}

function restart(){

document.getElementById("complete").style.display="none";

setLevel(size);

shuffle();

}

function changeImage(n){

currentImage+=n;

if(currentImage<0) currentImage=images.length-1;

if(currentImage>=images.length) currentImage=0;

setLevel(size);

}

setLevel(3);

</script>

</body>
</html>
